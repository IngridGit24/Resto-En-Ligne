version: "3.8"

services:
  # Backend service (Laravel)
  backend:
    build:
      context: ./backend
    container_name: laravel_backend
    volumes:
      - ./backend:/var/www
    networks:
      - app-network
    expose:
      - "9000" # PHP-FPM default port, internal to the Docker network

  # Nginx service (Reverse proxy)
  nginx:
    image: nginx:alpine
    container_name: nginx_server
    ports:
      - "8000:80" # Exposing Nginx on port 8000 on the host
    volumes:
      - ./backend:/var/www # Mount backend for Nginx to access Laravel files
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf # Nginx config file
    networks:
      - app-network

  # Frontend service (React)
  frontend:
    build:
      context: ./frontend
    container_name: react_frontend
    ports:
      - "3000:80" # Exposing React app on port 3000
    volumes:
      - ./frontend:/app
    networks:
      - app-network

  # Database service (MySQL)
  db:
    image: mysql:8
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: resto_en_ligne
    volumes:
      - mysql_data:/var/lib/mysql # Persistent MySQL data
    networks:
      - app-network
    ports:
      - "3306:3306" # Exposing MySQL on port 3306

  # Redis service (Optional, only if you plan to use Redis)
  redis:
    image: redis:alpine
    container_name: redis
    networks:
      - app-network
    expose:
      - "6379" # Redis default port, internal to the Docker network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
