version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
    container_name: react_frontend
    volumes:
      - ./frontend:/usr/share/nginx/html
    networks:
      - frontend-network

  nginx:
    image: nginx:alpine
    container_name: frontend-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx-frontend.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - frontend
    networks:
      - frontend-network

networks:
  frontend-network:
    driver: bridge
